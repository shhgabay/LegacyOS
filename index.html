<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEGACY_OS // BOOT_V2</title>
    <link rel="stylesheet" href="https://js-dos.com/v7/build/bundle/js-dos.css">
    <script src="https://js-dos.com/v7/build/bundle/js-dos.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #status { padding: 10px; font-size: 12px; background: #111; border-bottom: 1px solid #333; }
        
        /* תיקון הגובה כדי שהכפתור לא ייחתך */
        #dos-container { flex-grow: 1; width: 100vw; background: #000; position: relative; }
        
        .controls { padding: 20px; background: #000; border-top: 2px solid #00ff41; display: flex; justify-content: center; z-index: 100; }
        #btn-start { background: #00ff41; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; font-size: 1.1rem; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="status">SYS_STATUS: READY // WAITING_FOR_DISK</div>
    <div id="dos-container"></div>

    <div class="controls">
        <button id="btn-start">START_GAME</button>
    </div>

    <script>
        const container = document.getElementById("dos-container");
        const btnStart = document.getElementById("btn-start");

        btnStart.onclick = () => {
            document.getElementById('status').innerText = "SYS_STATUS: LOADING_ENGINE...";
            
            // שימוש בגרסה יציבה יותר וקישור ישיר
            Dos(container, {
                wdboxUrl: "https://js-dos.com/v7/build/bundle/wdbox.js",
                cycles: 1000,
                autolock: false
            }).run("https://js-dos.com/v7/build/test/digger.jsdos").then((runtime) => {
                document.getElementById('status').innerText = "SYS_STATUS: RUNNING_DIGGER";
                btnStart.parentElement.style.display = "none"; // מחביא את כל אזור הכפתור אחרי הטעינה
            }).catch((err) => {
                document.getElementById('status').innerText = "FATAL_ERROR: " + err;
            });
        };
    </script>
</body>
</html>
