<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEGACY_OS // IRONCLAD_V6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-dos/7.0.0/js-dos.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/js-dos/7.0.0/js-dos.css" rel="stylesheet">
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        #status { padding: 10px; font-size: 14px; border-bottom: 2px solid #00ff41; text-align: center; background: #0a0a0a; }
        #dos-container { flex-grow: 1; width: 100vw; background: #000; }
        .controls { 
            padding-bottom: env(safe-area-inset-bottom); /* הגנה מפני הפס של האייפון/אנדרואיד */
            background: #000; 
            border-top: 1px solid #333; 
            display: flex; 
            justify-content: center; 
            padding-top: 20px;
            padding-bottom: 40px;
        }
        #btn-start { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 15px 50px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            border-radius: 50px; 
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
        }
    </style>
</head>
<body>

    <div id="status">LEGACY_OS // STANDALONE_MODE</div>
    <div id="dos-container"></div>

    <div class="controls">
        <button id="btn-start" onclick="launch()">EXECUTE: BUBBLE_BOBBLE</button>
    </div>

    <script>
        function launch() {
            const container = document.getElementById("dos-container");
            const status = document.getElementById("status");
            document.querySelector(".controls").style.display = "none";
            status.innerText = "LOCAL_BOOT_IN_PROGRESS...";

            // טעינה מהקובץ המקומי שהעלית ל-GitHub
            Dos(container, {
                cycles: "auto",
                autolock: false
            }).run("bubble.jsdos").then((runtime) => {
                status.innerText = "SYSTEM_RUNNING // LOCAL_SOURCE";
            }).catch((err) => {
                status.innerText = "FATAL_ERROR: MISSING_FILE_IN_GITHUB";
                console.error(err);
            });
        }
    </script>
</body>
</html>
