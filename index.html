<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEGACY_OS // LOCAL_CORE</title>
    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #status { padding: 15px; font-size: 14px; background: #111; border-bottom: 2px solid #00ff41; text-align: center; }
        #dos-container { flex-grow: 1; width: 100vw; background: #000; }
        .controls { padding: 25px; background: #000; border-top: 2px solid #00ff41; display: flex; justify-content: center; }
        #btn-start { background: #00ff41; color: #000; border: none; padding: 18px 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">LOCAL_INIT: READY</div>
    <div id="dos-container"></div>

    <div class="controls">
        <button id="btn-start">EXECUTE_LEGACY_OS</button>
    </div>

    <script>
        const container = document.getElementById("dos-container");
        const btnStart = document.getElementById("btn-start");

        btnStart.onclick = async () => {
            document.getElementById("status").innerText = "LOADING_LOCAL_CORE...";
            btnStart.style.display = "none";

            try {
                // הפניה לקובץ wdbox המקומי שלך
                const runtime = await Dos(container, {
                    url: "wdbox.js"
                }).run("bubble.zip"); // כאן הוא יטען את הקובץ שהעלית

                document.getElementById("status").innerText = "SYSTEM_RUNNING: BUBBLE_BOBBLE";
            } catch (err) {
                document.getElementById("status").innerText = "CORE_ERROR: " + err.message;
            }
        };
    </script>
</body>
</html>
