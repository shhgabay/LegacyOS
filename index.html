<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEGACY_OS // V9_FINAL_BOOT</title>
    <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        #status { padding: 15px; font-size: 14px; border-bottom: 2px solid #00ff41; text-align: center; background: #0a0a0a; }
        #dos-container { flex-grow: 1; width: 100vw; height: 70vh; background: #000; }
        .controls { padding: 40px 20px; background: #000; display: flex; justify-content: center; }
        #btn-start { 
            background: #00ff41; color: #000; border: none; padding: 20px 60px; 
            font-weight: bold; font-size: 1.2rem; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status">LEGACY_OS // SYSTEM_READY</div>
    <div id="dos-container"></div>

    <div class="controls" id="ctrl-panel">
        <button id="btn-start" onclick="startLegacy()">START_BUBBLE</button>
    </div>

    <script>
        function startLegacy() {
            const status = document.getElementById("status");
            document.getElementById("btn-start").style.display = "none";
            status.innerText = "CONNECTING... PLEASE WAIT (UP TO 30 SEC)";

            // חזרה להגדרות הדיפולט שראינו שהתחילו להגיב
            Dos(document.getElementById("dos-container")).ready(function (fs, main) {
                status.innerText = "LOADING GAME...";
                fs.extract("https://js-dos.com/6.22/current/test/bubble.zip").then(function () {
                    status.innerText = "RUNNING!";
                    main(["-c", "bubble.exe"]);
                });
            });
        }
    </script>
</body>
</html>
