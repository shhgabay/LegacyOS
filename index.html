<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEGACY_OS // V7_STABLE</title>
    <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #status { padding: 10px; font-size: 14px; border-bottom: 2px solid #00ff41; text-align: center; background: #0a0a0a; }
        #dos-container { flex-grow: 1; width: 100vw; background: #000; }
        .controls { 
            padding: 20px 20px 60px 20px; /* רווח גדול מאוד למטה למניעת חיתוך */
            background: #000; 
            border-top: 1px solid #333; 
            display: flex; 
            justify-content: center;
        }
        #btn-start { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 15px 40px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }
    </style>
</head>
<body>

    <div id="status">LEGACY_OS // V7_READY</div>
    <div id="dos-container"></div>

    <div class="controls">
        <button id="btn-start" onclick="startLegacy()">LAUNCH_BUBBLE_BOBBLE</button>
    </div>

    <script>
        function startLegacy() {
            const status = document.getElementById("status");
            const btn = document.getElementById("btn-start");
            btn.style.display = "none";
            status.innerText = "CONNECTING_TO_ARCHIVE...";

            // שימוש בגרסה 6 עם טעינת ZIP ישירה
            Dos(document.getElementById("dos-container"), {
                wdboxUrl: "https://js-dos.com/6.22/current/wdbox.js"
            }).ready(function (fs, main) {
                status.innerText = "EXTRACTING_GAME_FILES...";
                fs.extract("https://js-dos.com/6.22/current/test/bubble.zip").then(function () {
                    status.innerText = "SYSTEM_RUNNING: BUBBLE_BOBBLE";
                    main(["-c", "bubble.exe"]); // פקודת ההרצה של המשחק
                });
            });
        }
    </script>
</body>
</html>
