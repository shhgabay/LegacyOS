<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEGACY_OS // BOOT_SEQUENCE</title>
    <link rel="stylesheet" href="https://js-dos.com/v7/build/bundle/js-dos.css">
    <script src="https://js-dos.com/v7/build/bundle/js-dos.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; }
        #dos-container { width: 100vw; height: 80vh; background: #111; }
        .controls { height: 20vh; display: flex; justify-content: center; align-items: center; gap: 20px; background: #000; border-top: 2px solid #333; }
        button { background: #222; color: #00ff41; border: 1px solid #00ff41; padding: 15px 30px; font-weight: bold; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 10px; z-index: 10; }
    </style>
</head>
<body>

    <div id="status">SYS_STATUS: READY // WAITING_FOR_DISK</div>
    
    <div id="dos-container"></div>

    <div class="controls">
        <button id="btn-start">START_GAME</button>
    </div>

    <script>
        const container = document.getElementById("dos-container");
        const btnStart = document.getElementById("btn-start");

        btnStart.onclick = () => {
            document.getElementById('status').innerText = "SYS_STATUS: LOADING_ROM...";
            
            // טעינת האמולטור
            Dos(container).run("https://js-dos.com/v7/build/test/digger.jsdos").then((runtime) => {
                document.getElementById('status').innerText = "SYS_STATUS: RUNNING";
                
                // כאן נוסיף בעתיד את הג'ויסטיק הוירטואלי
            });
            
            btnStart.style.display = "none";
        };
    </script>
</body>
</html>
